<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todolist</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 10px; width: 200px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
        ul { list-style: none; padding: 0; width: 300px; margin: 20px auto; text-align: right; }
        li { background: #f4f4f4; border-bottom: 1px solid #ddd; padding: 10px; cursor: pointer; }
        .done { text-decoration: line-through; color: gray; background: #e9ecef; }
  </style>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
  <h2>To Do List</h2>
  <input type="text" name="taskInput" id="taskInput" placeholder="Add your tasks...">
  <button id="addBtn">Add New Task</button>


  <h3>Your tasks</h3>
  <ul id="taskList">

  </ul>


  <script>
    $(document).ready(function() {
      $("#addBtn").click(function() {
        var taskText = $("#taskInput").val();

        if(taskText !== ""){
          $("#taskList").append("<li>" + taskText + " <span style='float:left; color:red;'>🗑️</span></li>");
        }

        $("#taskInput").val("");
      })
    
    
      $("#taskList").on("click", "li", function(){
        $(this).toggleClass("done");
      })


      $("#taskList").on("click", "span", function(e){
        e.stopPropagation();
        $(this).parent().fadeOut(500, function() {
          $(this).remove();
        })
      })
    })
  </script>
</body>
</html>
