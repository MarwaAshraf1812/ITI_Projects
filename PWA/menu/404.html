<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sushi-red: #d93025;
        }
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .error-code {
            font-size: 100px;
            font-weight: 900;
            color: var(--sushi-red);
            line-height: 1;
            margin-bottom: 20px;
        }
        .sushi-icon {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        .btn-home {
            background-color: var(--sushi-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-home:hover {
            background-color: #b0231a;
            color: white;
            box-shadow: 0 5px 15px rgba(217, 48, 37, 0.3);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <span class="sushi-icon">🍱</span>
        <div class="error-code">404</div>
        <h2 class="fw-bold">Whoops! Page Dropped.</h2>
        <p class="text-muted">Like a piece of sushi falling from chopsticks, this page is gone! Let's get you back to the menu.</p>
        
        <a href="index.html" class="btn btn-home">Back to Home Menu</a>
        
        <div class="mt-4">
            <small class="text-secondary">If you think this is a mistake, please contact us.</small>
        </div>
    </div>

</body>
</html>
