<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Sushi Delight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sushi-red: #d93025;
        }
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: sans-serif;
        }
        .offline-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .btn-retry {
            background-color: var(--sushi-red);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-retry:hover {
            background-color: #b0231a;
            color: white;
        }
    </style>
</head>
<body>

    <div class="offline-card">
        <div class="icon-box">🍣🚫</div>
        <h2 class="fw-bold">Oops! You're Offline</h2>
        <p class="text-muted">It seems you've lost your connection. Don't worry, our sushi is still fresh!</p>
        
        <div class="alert alert-warning py-2" role="alert" style="font-size: 0.9rem;">
            Some pages are available offline if you've visited them before.
        </div>

        <a href="index.html" class="btn btn-retry mt-3">Try Going Home</a>
        <br>
        <small class="d-block mt-4 text-secondary">Check your internet connection and refresh.</small>
    </div>

</body>
</html>
