<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sushi Delight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sushi-red: #d93025;
            --soft-bg: #f8f9fa;
        }

        body {
            background-color: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: var(--sushi-red);
        }

        .navbar-brand, .nav-link {
            color: white !important;
        }

        .contact-container {
            max-width: 600px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid var(--sushi-red);
        }

        .form-control:focus {
            border-color: var(--sushi-red);
            box-shadow: 0 0 0 0.25 row rgba(217, 48, 37, 0.25);
        }

        .btn-send {
            background-color: var(--sushi-red);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        .btn-send:hover {
            background-color: #b0231a;
            color: white;
            transform: translateY(-2px);
        }

        .status-badge {
            font-size: 0.8rem;
            margin-top: 10px;
            display: block;
            color: #666;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 20px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">🍣 Sushi Delight</a>
            <div class="ms-auto">
                <a class="nav-link d-inline-block px-2" href="index.html">Home</a>
                <a class="nav-link d-inline-block px-2" href="about.html">About</a>
                <a class="nav-link d-inline-block px-2 fw-bold" href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="contact-container text-center">
            <h2 class="mb-3 fw-bold">Get in Touch 🥢</h2>
            <p class="text-muted mb-4">Have a question about our sushi? Drop us a message!</p>
            
            <form id="contact-form">
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Your Name</label>
                    <input type="text" class="form-control form-control-lg" placeholder="Enter your name" required>
                </div>
                
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Message</label>
                    <textarea class="form-control" rows="4" placeholder="How can we help you?"></textarea>
                </div>

                <button type="button" class="btn btn-send shadow-sm">
                    Send Message (Offline Friendly)
                </button>
                
                <small class="status-badge">
                    <i class="bi bi-wifi-off"></i> Your message will be synced once you're back online.
                </small>
            </form>
        </div>
    </div>

    <footer class="text-center">
        <p>© 2026 Sushi Delight PWA - ITI Student Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
