<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #0a58ca, #031633);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-custom {
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .title {
      font-weight: bold;
      color: #0d6efd;
      text-align: center;
    }

    .btn-custom {
      background: linear-gradient(45deg, #0d6efd, #0a58ca);
      border: none;
      font-weight: 600;
    }

    .btn-custom:hover {
      background: linear-gradient(45deg, #0a58ca, #031633);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card card-custom p-4">
          <h2 class="title mb-4">To Do List</h2>

          <form>

            <div class="mb-3">
              <label class="form-label">Task Title</label>
              <input type="text" id="title" class="form-control" placeholder="Enter task title">
            </div>

            <div class="row mb-3">
              <label class="form-label fw-bold text-primary">Set Due Time (24h Format)</label>
              <div class="input-group">
                <span class="input-group-text bg-primary text-white">Time</span>
                <input type="number" id="hour" class="form-control" placeholder="HH (0-23)" min="0" max="23">
                <span class="input-group-text">:</span>
                <input type="number" id="minute" class="form-control" placeholder="MM (0-59)" min="0" max="59">
              </div>
              <small class="text-muted">Example: 17:00 for 5:00 PM</small>
            </div>

            <div class="row mb-4">
              <div class="col">
                <label class="form-label">Day</label>
                <select class="form-select" id="day">
                  <option selected disabled>Select Day</option>
                  <script>
                    for (let i = 1; i <= 31; i++) {
                      document.write(`<option>${i}</option>`)
                    }
                  </script>
                </select>
              </div>

              <div class="col">
                <label class="form-label">Month</label>
                <select class="form-select" id="month">
                  <option value="" selected disabled>Select Month</option>
                  <option value="1">January</option>
                  <option value="2">February</option>
                  <option value="3">March</option>
                  <option value="4">April</option>
                  <option value="5">May</option>
                  <option value="6">June</option>
                  <option value="7">July</option>
                  <option value="8">August</option>
                  <option value="9">September</option>
                  <option value="10">October</option>
                  <option value="11">November</option>
                  <option value="12">December</option>
                </select>
              </div>

              <div class="col">
                <label class="form-label">Year</label>
                <select class="form-select" id="year">
                  <option>2026</option>
                  <option>2027</option>
                  <option>2028</option>
                </select>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-custom" id="addBtn">
                Add Task
              </button>
            </div>

          </form>
          <hr class="my-4">
          <div>
            <h5 class="text-primary mb-3">My Tasks</h5>

            <ul id="taskList" class="list-group list-group-flush">
              <!-- Tasks will appear here -->
            </ul>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="idb.js"></script>
  <script src="app.js"></script>

</body>

</html>
