<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 1 - Grid Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo"><h3>Logo</h3></div>
    <nav>
      <ul class="nav-links">
        <li>Home</li><li>About</li><li>Services</li><li>Contact</li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-grid">
      <div class="intro-text">
        <h1>Intro</h1>
        <p>Some introduction lines about the website or company.</p>
      </div>
      <div class="slider-box">
        Featured Project slider
      </div>
    </section>

    <section class="services-grid">
      <div class="card">Services</div>
      <div class="card">Services</div>
      <div class="card">Services</div>
      <div class="card">Recent Work</div>
      <div class="card">Recent Work</div>
      <div class="card">Recent Work</div>
    </section>

    <section class="feed-container">
      <div class="feed">Twitter Fead</div>
    </section>
  </main>

  <footer>
    <nav>
      <ul class="nav-links">
        <li>Home</li><li>About</li><li>Services</li><li>Contact</li>
      </ul>
    </nav>
    <div class="logo"><h3>Logo</h3></div>
  </footer>

</body>
</html>
