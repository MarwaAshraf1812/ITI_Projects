<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 3: Animation</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
        }
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>

    <canvas id="myCanvas" width="400" height="400"></canvas>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');
        
        var x = 0;
        var y = 0;

        ctx.lineWidth = 5;
        ctx.strokeStyle = "red";

        var animation = setInterval(function() {
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.closePath();

            x += 3;
            y += 3;

            if (x > canvas.width || y > canvas.height) {
                clearInterval(animation);
                alert("animation end");
            }

        }, 20);
    </script>

</body>
</html>
