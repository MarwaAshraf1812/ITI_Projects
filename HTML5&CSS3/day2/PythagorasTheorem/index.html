<!DOCTYPE html>
<html>
<head>
    <title>SVG & MathML Task</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        math mi {
            color: red;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h3>2. SVG & MathML</h3>
    
    <svg width="300" height="200">
        <polygon points="150,20 150,150 80,150" fill="red" />
        
        <text x="100" y="80" fill="black">c</text> <text x="160" y="90" fill="black">b</text> <text x="110" y="170" fill="black">a</text> </svg>

    <div>
        <strong>according to pythagoras theorem</strong>
    </div>
    <br>

    <math xmlns="http://www.w3.org/1998/Math/MathML">
        
        <mi>c</mi> <mo>=</mo> <msqrt> <msup> <mi>a</mi>
                <mn>2</mn> </msup>
            
            <mo>+</mo>
            
            <msup>
                <mi>b</mi>
                <mn>2</mn>
            </msup>
            
        </msqrt>
    </math>

</body>
</html>
