<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>validation-pseudo-classes</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="container">
    <h2>Change Email Address</h2>

    <div class="form-child">
      <input type="text" name="username" id="username" placeholder="Username" required pattern="[A-Za-z]+">
      <span>The required user name may only be a series of alphabetical characters </span>
    </div>

    <div class="form-child">
      <input type="email" name="userEmail" id="userEmail" placeholder="Email" required pattern="[a-zA-Z0-9.]+@[a-zA-Z0-9.]+">
      <span>The required Email may not include any special characters other than the '@' sign</span>
    </div>

    <button class="btn">Change</button>
  </div>
</body>

</html>
