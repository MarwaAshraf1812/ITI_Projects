<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 1 - Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-container">
    
    <div>
      <video src="./frozen.mp4" id="vidField"></video>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between;">
      <input type="range" value="0" min="0" id="scrapperId"/>
      <span id="timeDisplay" style="margin-left: 10px; font-size: 14px; min-width: 80px;">0:00 / 0:00</span>
    </div>

    <div class="controls-row">
      
      <div class="btn-group">
        <button id="playBtn">Play</button>
        <button id="stopBtn">Stop</button>
        <button id="beginBtn">&lt;&lt;</button>
        <button id="backBtn">&lt;</button>
        <button id="fwdBtn">&gt;</button>
        <button id="endBtn">&gt;&gt;</button>
      </div>

      <div class="sliders-group">
        <span>Speed</span>
        <input type="range" id="speedId" min="0.5" max="2" step="0.25" value="1">
        
        <span>Vol</span>
        <input type="range" min="0" max="1" step="0.1" value="1" id="volumeId">
        <button id="muteBtn">Mute</button>
      </div>

    </div>

  </div>
  
  <script src="./script.js"></script>
</body>
</html>
