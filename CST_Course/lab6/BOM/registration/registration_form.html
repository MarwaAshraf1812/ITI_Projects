<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <h2><b>Register Now</b></h2>
  <form method="GET" action="welcome_page.html">
    <div class="form_child">
      <label for="userName">Username</label>
      <input type="text" id="userName" name="userName" placeholder="ex: marwa1812...">
    </div>

    <div class="form_child">
      <label for="jobTitle">Job Title</label>
      <input type="text" id="jobTitle" name="jobTitle" placeholder="ex: Web Developer...">
    </div>

    <div class="form_child">
      <label for="uEmail">Email</label>
      <input type="email" id="uEmail" name="uEmail" placeholder="ex: marwa18@gmail.com...">
    </div>

    <div class="form_child">
      <label for="pass">Password</label>
      <input type="password" id="pass" name="pass">
    </div>

    <div class="form_child">
      <label for="userMobile">Mobile</label>
      <input type="text" id="userMobile" name="userMobile" placeholder="ex: 01012345678...">
    </div>

    <div class="form_child">
      <label for="userAddress">Address</label>
      <input type="text" id="userAddress" name="userAddress" placeholder="ex: Cairo, Egypt...">
    </div>

    <div class="form_child">
      <label>Gender:</label>
      <input type="radio" name="gender" value="Male"> Male
      <input type="radio" name="gender" value="Female"> Female <br><br>
    </div>

    <div class="btn">
      <input type="submit" value="Register">
    </div>

  </form>

</body>

</html>
