<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Management</title>
  <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .gender-option {
            display: inline-block;
            text-align: center;
            margin-right: 20px;
        }
        img {
            width: 100px; 
            height: auto;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <label>Enter your name: </label>
        <input type="text" id="nameInput">
    </div>

    <div class="input-group">
        <label>Enter your age : </label>
        <input type="number" id="ageInput">
    </div>

    <div class="input-group">
        <p>Select your Gender:</p>
        
        <div class="gender-option">
            <img src="./cookies/1.jpg" alt="Male Silhouette">
            <input type="radio" name="gender" value="male">
        </div>

        <div class="gender-option">
            <img src="./cookies/2.jpg" alt="Female Silhouette">
            <input type="radio" name="gender" value="female">
        </div>
    </div>

    <div class="input-group">
        <label>Select your favorite color: </label>
        <select id="colorSelect">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="black">Black</option>
        </select>
    </div>

    <input type="submit" id="submitBtn" value="Register" onclick="registerUser()">
    <script src="./cookies_library.js"></script>
</body>
</html>
