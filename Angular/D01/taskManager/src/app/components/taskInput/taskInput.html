<div class="task-input-wrapper expanded">
  <div class="input-container">
    @if(currentError) {
      <div  class="error-banner">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{{currentError.message}}</span>

      </div>
    }
    <div class="main-input-row">
      <div class="input-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <input type="text" class="task-input-field" placeholder="Task Title..." #titleInput>
    </div>

    <div class="expanded-content">
      <textarea class="description-field" placeholder="Add description..." #descInput></textarea>
      
      <div class="metadata-row">
        <div class="meta-item">
          <label>Due Date</label>
          <div class="date-input-wrapper">
             <input type="date" class="meta-input"  #dateInput>
          </div>
        </div>
        
        <div class="meta-item">
          <label>Priority</label>
          <div class="priority-selector"> 
            <button class="priority-pill low" [class.active]="selectedPriority === 'low'" (click)="setPriority('low')">Low</button>
            <button class="priority-pill medium" [class.active]="selectedPriority === 'medium'" (click)="setPriority('medium')">Medium</button>
            <button class="priority-pill high" [class.active]="selectedPriority === 'high'" (click)="setPriority('high')">High</button>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button class="cancel-btn">Cancel</button>
        <button class="add-task-btn large" (click)="createTask(titleInput.value, descInput.value, dateInput.value)">
          <span>Create Task</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
