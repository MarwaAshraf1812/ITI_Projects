<div class="task-card">
  <div class="card-header">
    <select #typeSelect class="status-badge" [ngClass]="getBadgeClass()" (change)="changeType(typeSelect.value)">
      <option value="To Do" [selected]="task.type === 'To Do'" class="todo-opt">To Do</option>
      <option value="In Progress" [selected]="task.type === 'In Progress'" class="inprog-opt">In Progress</option>
      <option value="Done" [selected]="task.type === 'Done'" class="done-opt">Done</option>
    </select>
    <span class="priority-indicator" [class]="'priority-' + task.priority"></span>
  </div>
  <h3 class="task-title">{{ task.title }}</h3>
  <p class="task-desc">{{ task.description }}</p>
  <div class="card-footer">
    <div class="due-date">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 7V3M16 7V3M7 11H17M5 21H19C20.1046 21 21 20.1046 21 19V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V19C3 20.1046 3.89543 21 5 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      {{ task.dueDate }}
    </div>
    
    <div class="actions">
      <button class="action-btn btn-complete" title="Complete Task">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn btn-update" title="Update Task">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn btn-delete" title="Delete Task">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
