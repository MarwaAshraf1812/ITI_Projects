<div class="task-input-wrapper expanded">
  <div class="input-container">
    <div class="main-input-row" [class.has-error]="errors.title">
      <div class="input-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <input type="text" class="task-input-field" placeholder="Task Title..." #titleInput [value]="currentTask?.title || ''" (input)="validateField('title', titleInput.value)">
    </div>
    @if(errors.title) {
      <div class="field-error-text">{{errors.title}}</div>
    }

    <div class="expanded-content">
      <textarea class="description-field" [class.invalid]="errors.description" placeholder="Add description..." #descInput [value]="currentTask?.description || ''" (input)="validateField('description', descInput.value)"></textarea>
      @if(errors.description) {
        <div class="field-error-text">{{errors.description}}</div>
      }
      
      <div class="metadata-row">
        <div class="meta-item">
          <label>Due Date</label>
          <div class="date-input-wrapper" [class.invalid]="errors.dueDate">
             <input type="date" class="meta-input"  #dateInput [value]="currentTask?.dueDate || ''" (change)="validateField('dueDate', dateInput.value)">
          </div>
          @if(errors.dueDate) {
            <div class="field-error-text small">{{errors.dueDate}}</div>
          }
        </div>
        
        <div class="meta-item">
          <label>Priority</label>
          <div class="priority-selector"> 
            <button class="priority-pill low" [class.active]="selectedPriority === 'low'" (click)="setPriority('low')">Low</button>
            <button class="priority-pill medium" [class.active]="selectedPriority === 'medium'" (click)="setPriority('medium')">Medium</button>
            <button class="priority-pill high" [class.active]="selectedPriority === 'high'" (click)="setPriority('high')">High</button>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <button class="cancel-btn" (click)="cancelEditState(titleInput, descInput, dateInput)">Cancel</button>
        <button class="add-task-btn large" (click)="createTask(titleInput, descInput, dateInput)">
          <span>{{ isEditMode ? 'Update Task' : 'Create Task' }}</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
