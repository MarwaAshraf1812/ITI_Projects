 <div class="create-task-panel glass-panel">
    <div class="panel-header">
      <span class="magic-icon">📜</span>
      <h2>New Assignment</h2>
    </div>
    
    <form class="task-form">
      
      <div class="form-row">
        <div class="form-group flex-2">
          <label for="title">Scroll Title</label>
          <input type="text" id="title" placeholder="e.g., Practice Patronus Charm..." required>
        </div>
        
        <div class="form-group flex-1">
          <label for="dueDate">Due Date</label>
          <input type="date" id="dueDate" required>
        </div>
      </div>

      <div class="form-group">
        <label for="description">Assignment Details</label>
        <textarea id="description" rows="3" placeholder="Describe the magical steps required..."></textarea>
      </div>

      <div class="form-row tri-column">
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority">
            <option value="High">High ⚠️</option>
            <option value="Medium" selected>Medium ⚡</option>
            <option value="Low">Low 🕯️</option>
          </select>
        </div>

        <div class="form-group">
          <label for="category">Subject Category</label>
          <select id="category">
            <option value="Potions">Potions 🧪</option>
            <option value="Spells">Spells & Charms ✨</option>
            <option value="Herbology">Herbology 🌱</option>
            <option value="Quidditch">Quidditch 🧹</option>
            <option value="Other">Other 📜</option>
          </select>
        </div>

        <div class="form-group">
          <label for="house">House Affiliation</label>
          <select id="house">
            <option value="Gryffindor">Gryffindor 🦁</option>
            <option value="Ravenclaw">Ravenclaw 🦅</option>
            <option value="Hufflepuff">Hufflepuff 🦡</option>
            <option value="Slytherin">Slytherin 🐍</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn task-submit-btn">Conjure Task</button>
    </form>
  </div>
