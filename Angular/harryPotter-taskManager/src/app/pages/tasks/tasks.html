<div class="tasks-page-wrapper">
  
  <div class="tasks-header">
    <div class="header-main">
      <h1 class="sparkle-text">Magical Task Board</h1>
      <button class="create-btn" routerLink="/task-manager">
        <span class="plus">✨</span> Create New Task
      </button>
    </div>
    <div class="search-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" name="search" id="search" placeholder="Search tasks..." (input)="onSearch($event)" class="search-input">
      </div>
    </div>
  </div>

  <div class="task-controls">
  <div class="tabs-container">
  <button 
    class="tab-btn" 
    [class.active]="taskService.selectedTab() === 'All'" 
    (click)="taskService.setActiveTab('All')">All</button>

  <button 
    class="tab-btn" 
    [class.active]="taskService.selectedTab() === 'To Do'" 
    (click)="taskService.setActiveTab('To Do')">To Do</button>

  <button 
    class="tab-btn" 
    [class.active]="taskService.selectedTab() === 'In Progress'" 
    (click)="taskService.setActiveTab('In Progress')">In Progress</button>

  <button 
    class="tab-btn" 
    [class.active]="taskService.selectedTab() === 'Done'" 
    (click)="taskService.setActiveTab('Done')">Done</button>
</div>


    <button class="delete-all-btn" (click)="deleteAllTasks()">
      Vanish All Tasks ✖
    </button>
  </div>

  <app-task-list [tasks]="taskService.paginatedTasks()"></app-task-list>
  <div class="pagination-controls">
  <button 
    [disabled]="taskService.currentPage() === 1" 
    (click)="taskService.goToPage(taskService.currentPage() - 1)">Previous</button>
    
  <span>Page {{ taskService.currentPage() }} of {{ taskService.totalPages() }}</span>
  
  <button 
    [disabled]="taskService.currentPage() === taskService.totalPages()" 
    (click)="taskService.goToPage(taskService.currentPage() + 1)">Next</button>
</div>


</div>
