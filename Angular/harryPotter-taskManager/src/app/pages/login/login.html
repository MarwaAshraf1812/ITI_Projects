<div class="auth-container">
  <div class="auth-card login-card glass-panel">
    
    <div class="auth-header">
      <div class="magic-icon login-icon">🗝️</div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Enter your credentials to access your tasks</p>
    </div>


    <form class="auth-form" #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      
      <div class="form-group">
        <label for="email">Owl Post (Email)</label>
        <div class="input-wrapper">
          <span class="input-icon">🦉</span>
          <input
          [(ngModel)]="user.email"
          name="email"
          email
          type="email"
          id="email"
          #email="ngModel"
          placeholder="student@hogwarts.edu"
          required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Secret Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
          [(ngModel)]="user.password"
          name="password"
          type="password"
          id="password"
          #password="ngModel"
          placeholder="Alohomora..."
          required>
        </div>

      </div>
      <button type="submit" class="submit-btn login-btn">Lumos (Login)</button>
    </form>

    <div class="auth-footer">
      <p>Haven't received your letter yet? <a routerLink="/register" class="auth-link">Enroll here</a></p>
    </div>

  </div>
</div>
