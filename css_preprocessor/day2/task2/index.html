<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .row { 
      margin: 0 -10px; 
      overflow: hidden; 
    }
    .col-1, .col-2, .col-3, .col-4, .col-5, .col-6,
    .col-7, .col-8, .col-9, .col-10, .col-11, .col-12,
    [class*="col-"] {
      padding: 0 10px;
    }
    div { border: 1px solid #333; text-align:center; padding:10px; }
  </style>
</head>
<body>

  <h1>Responsive Grid Demo</h1>

  <div class="row">
    <div class="col-12 col-sm-6 col-md-4">Column 1</div>
    <div class="col-12 col-sm-6 col-md-4">Column 2</div>
    <div class="col-12 col-sm-6 col-md-4">Column 3</div>
    <div class="col-12 col-sm-6 col-md-4">Column 4</div>
    <div class="col-12 col-sm-6 col-md-4">Column 5</div>
    <div class="col-12 col-sm-6 col-md-4">Column 6</div>
  </div>

</body>
</html>
