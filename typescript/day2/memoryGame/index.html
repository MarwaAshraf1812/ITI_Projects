<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Stitch Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-dark text-white">
    <nav class="navbar px-4 py-3 w-100" style="background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;">
        <div class="container-fluid align-items-center">
            <span class="navbar-brand fw-bold mb-0" style="color: var(--accent-color); letter-spacing: 1px;">👽 Stitch Memory 🌺</span>
            <div class="d-flex align-items-center" style="width: 300px; max-width: 50%;">
                <span class="me-3 fw-bold d-none d-sm-block text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px; color: var(--accent-color);">🎮 Progress</span>
                <div class="progress-container flex-grow-1 me-3" style="height: 8px;">
                    <div id="game-progress" class="progress-bar-neon" style="width: 0%;"></div>
                </div>
                <span id="progress-percent" class="fw-bold fs-6" style="color: var(--accent-color); min-width: 45px; text-align: right;">0%</span>
            </div>
        </div>
    </nav>

    <div class="game-wrapper">
        <div class="container py-5">
            <header class="text-center mb-4">
                <h1 class="main-title mb-2">Stitch Edition</h1>
                <p class="subtitle mb-4">Match the pairs to reveal Stitch and his friends ✨🌴</p>

            </header>

            <main class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-4 justify-content-center" id="game-board">
                <!-- Cards will be injected here -->
            </main>

            <footer class="text-center mt-5">
                <button id="start-btn" class="btn-neon">
                    <span>🏄‍♂️ Start New Game 🌊</span>
                </button>
            </footer>
        </div>
    </div>

    <script type="module" src="dist/main.js"></script>
</body>
</html>
