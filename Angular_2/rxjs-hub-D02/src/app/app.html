<h1 style="display: none;">Hello, {{ title() }}</h1>

<div class="min-h-screen bg-slate-50 text-slate-800 font-sans pb-12">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div class="flex items-center gap-3">
        <span class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
          RxJS Patterns Hub
        </span>
      </div>
      
      <nav class="flex space-x-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
        <button 
          (click)="setActiveTab(1)"
          [class]="activeTab() === 1 ? 'bg-indigo-600 text-white font-semibold shadow-sm' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-200/50'"
          class="px-4 py-2 text-xs md:text-sm rounded-lg transition duration-200 cursor-pointer">
          Student Hub
        </button>
        <button 
          (click)="setActiveTab(2)"
          [class]="activeTab() === 2 ? 'bg-indigo-600 text-white font-semibold shadow-sm' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-200/50'"
          class="px-4 py-2 text-xs md:text-sm rounded-lg transition duration-200 cursor-pointer">
          Movie Hub
        </button>
        <button 
          (click)="setActiveTab(3)"
          [class]="activeTab() === 3 ? 'bg-indigo-600 text-white font-semibold shadow-sm' : 'text-slate-600 hover:text-slate-800 hover:bg-slate-200/50'"
          class="px-4 py-2 text-xs md:text-sm rounded-lg transition duration-200 cursor-pointer">
          Cart Hub
        </button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 mt-8">
    @if (activeTab() === 1) {
      <app-student-list />
    }
    
    @if (activeTab() === 2) {
      <app-movie-search />
    }

    @if (activeTab() === 3) {
      <app-cart-hub />
    }

  </main>
</div>
